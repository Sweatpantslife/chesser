# Chesser — Docker Compose deployment.
#
# Built for Coolify (which provides Traefik + TLS automatically). On Coolify the
# `SERVICE_FQDN_*` variable below makes the proxy route your chosen domain to the
# app on port 8787; nothing else (no Traefik labels, no published ports) needed.
#
# Plain Docker Compose (local/VPS): uncomment the `ports` mapping and browse to
# http://localhost:8787  —  `docker compose up --build -d`.

services:
  chesser:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Stockfish-only by default (small, fast build). For human-like Maia bots:
        #   ENGINE_SETUP: ""        # full setup (Stockfish + Maia nets + Lc0)
        #   ENGINE_TOOLCHAIN: "1"   # install the Lc0 build toolchain
        ENGINE_SETUP: "ONLY=stockfish"
        ENGINE_TOOLCHAIN: "0"
        # Pin the Stockfish build for portability (avx2 suits most modern x86-64;
        # use x86-64-sse41-popcnt for older CPUs if you hit "illegal instruction").
        SF_VARIANT: "x86-64-avx2"
    image: chesser:latest
    restart: unless-stopped
    # PID 1 init so spawned Stockfish/Lc0 processes are reaped cleanly.
    init: true
    environment:
      # Coolify: generates a domain and wires Traefik to this service's port 8787.
      # The `=/` value (root path) is required: Coolify's compose parser turns a
      # value-less entry into an invalid numeric key ("non-string key in
      # services.chesser.environment: 0") and fails the build. `=/` is equivalent
      # to the bare form (root path). Remove this line for plain Docker Compose.
      - SERVICE_FQDN_CHESSER_8787=/
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8787
      # One reverse proxy (Coolify's Traefik) in front: trust exactly one
      # X-Forwarded-* hop so per-IP rate limits key on real client addresses
      # and HSTS is emitted (the proxy terminates TLS). Remove this line if
      # you publish the container port directly with no proxy.
      - TRUST_PROXY=1
      # Extra browser origins allowed to call the API cross-origin
      # (comma-separated). Unset = same-origin only, the normal deployment.
      # - CHESSER_ALLOWED_ORIGINS=
      # Engine resource budget per Stockfish process — tune to your host.
      - CHESSER_THREADS=2
      - CHESSER_HASH_MB=128
      # External data upstreams (must be reachable from the server). Defaults shown.
      # - CHESSER_TABLEBASE_URL=https://tablebase.lichess.ovh/standard
      # - CHESSER_EXPLORER_MASTERS_URL=https://explorer.lichess.ovh/masters
      # - CHESSER_EXPLORER_LICHESS_URL=https://explorer.lichess.ovh/lichess
      # Local Syzygy tablebases (see the volume mount below).
      # - CHESSER_SYZYGY_PATH=/syzygy
      # Observability (see .env.example): bearer token for GET /metrics —
      # RECOMMENDED on a public domain, the endpoint is open without it — and
      # an optional Sentry-compatible DSN for error reports.
      # - CHESSER_METRICS_TOKEN=
      # - CHESSER_SENTRY_DSN=
      # - CHESSER_LOG_LEVEL=info
      # Bearer-session lifetime in days (sliding renewal). Default 30.
      # - CHESSER_SESSION_TTL_DAYS=30
      # Concurrent /ws engine-session caps (each session may spawn up to two
      # Stockfish processes). Defaults: 32 global / 8 per client IP.
      # - CHESSER_WS_MAX_SESSIONS=32
      # - CHESSER_WS_MAX_SESSIONS_PER_IP=8
      # SECRET: Lichess API token for the opening explorer (explorer.lichess.ovh
      # requires auth). Without it the explorer reports itself unavailable.
      # - CHESSER_LICHESS_TOKEN=
      # SECRETS: server-side AI-coach LLM key (Anthropic wins when both are
      # set) + optional model / OpenAI-compatible base-URL overrides. Unset =
      # clients fall back to rule-based explanations (or bring their own key).
      # - ANTHROPIC_API_KEY=
      # - OPENAI_API_KEY=
      # - COACH_LLM_MODEL=
      # - COACH_LLM_BASE_URL=
    expose:
      - "8787"
    # ports:
    #   - "8787:8787"   # local testing only — Coolify/Traefik does not need this
    volumes:
      - chesser-data:/data
      # Optional: serve your own Syzygy tablebases without rebuilding the image.
      # - /srv/syzygy:/syzygy:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||8787)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  chesser-data:
